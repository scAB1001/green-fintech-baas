services:
  postgres_test:
    image: postgres:18-alpine
    container_name: green-fintech-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: green_fintech_test
    ports:
      - "${TEST_DB_PORT:-5433}:5432"  # Use different port to avoid conflicts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
