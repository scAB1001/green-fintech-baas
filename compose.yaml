# docker-compose.yml
services:
  postgres:
    image: postgres:18-alpine
    container_name: green-fintech-db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-green_fintech}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # SCRAM-SHA-256 is modern PG standard for secure password hashing
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---auth=scram-sha-256}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Manual override for postgres.conf allows fine-tuning connections/logs
      - ./scripts/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c 'config_file=/etc/postgresql/postgresql.conf'
    healthcheck:
      # Ensures API doesn't start until DB is ready to accept queries
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - green-fintech-network
    restart: unless-stopped

  api:
    build: .
    container_name: green-fintech-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      # Connecting via service name 'postgres' (Docker internal DNS)
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-green_fintech}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@green-fintech-cache:6379
    ports:
      - "8080:8000" # Maps local 8080 to container 8000
    volumes:
      # HOT RELOAD: Only for local dev. Remove in production Dockerfile/Compose.
      - ./src:/app/src
    networks:
      - green-fintech-network
