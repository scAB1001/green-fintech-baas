services:
  postgres:
    image: postgres:18-alpine
    container_name: green-fintech-db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-green_fintech}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # Optional: Additional authentication method (defaults to scram-sha-256)
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:---auth=scram-sha-256}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Custom initialization scripts (optional)
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
      # Custom configuration (optional)
      # - ./scripts/postgresql.custom.conf:/etc/postgresql/postgresql.conf:ro
      - ./scripts/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c 'config_file=/etc/postgresql/postgresql.conf'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - green-fintech-network
    restart: unless-stopped

  api:
    build: .
    container_name: green-fintech-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production  # Force production names inside the container
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-green_fintech}
    ports:
      - "8080:8000"
    networks:
      - green-fintech-network

  redis:
    image: redis:8-alpine
    container_name: green-fintech-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - green-fintech-network

networks:
  green-fintech-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
