[tool.poetry]
name = "green-fintech-baas"
version = "0.1.0"
description = "Green FinTech BaaS Simulator API for sustainable finance"
authors = ["scAB1001 <sc222ab@leeds.ac.uk>"]
readme = "README.md"
packages = [{include = "app", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.12"
fastapi = ">=0.115.0"
uvicorn = {extras = ["standard"], version = ">=0.30.0"}
pydantic = ">=2.0.0"
pydantic-settings = ">=2.0.0"

[tool.poetry.group.dev.dependencies]
python-dotenv = ">=1.2.1"
pytest = ">=9.0.2"
pytest-cov = ">=7.0.0"
pytest-asyncio = ">=1.3.0"
httpx = ">=0.28.1"
black = ">=26.1.0"
isort = ">=7.0.0"
ruff = ">=0.15.0"
mypy = ">=1.19.1"
pre-commit = ">=4.5.1"

[build-system]
requires = ["poetry-core>=2.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.urls]
Homepage = "https://github.com/scAB1001/green-fintech-baas"
Repository = "https://github.com/scAB1001/green-fintech-baas.git"

[tool.black]
line-length = 79
target-version = ['py312']

[tool.isort]
profile = "black"
line_length = 79

[tool.ruff]
line-length = 79

[tool.ruff.lint]  # Updated to use lint section
select = ["E", "F", "I", "B", "C4", "ARG", "SIM"]
# Add the `line-too-long` rule to the enforced rule set.
extend-select = ["E501"]
ignore = []

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers -p no:warnings"
testpaths = ["tests"]
python_files = "test_*.py"
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Set to true later when ready
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
ignore_missing_imports = true
exclude = [
    '^tests/',
    '^alembic/',
]

[[tool.mypy.overrides]]
module = [
    "pytest.*",
    "fastapi.*",
    "sqlalchemy.*",
    "alembic.*",
]
ignore_missing_imports = true
