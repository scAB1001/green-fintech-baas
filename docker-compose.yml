# docker-compose.yml
version: '3.8'

services:
  api:
    build: .
    container_name: green-fintech-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/green_fintech
      - ENVIRONMENT=development
    volumes:
      - ./src/app:/app/src/app
      - ./alembic:/app/alembic
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - green-fintech-network

  db:
    image: postgres:16-alpine
    container_name: green-fintech-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=green_fintech
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - green-fintech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  green-fintech-network:
    driver: bridge

volumes:
  postgres_data: