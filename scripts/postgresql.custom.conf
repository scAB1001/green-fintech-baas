# Performance tuning for Green FinTech app

# Connection settings
max_connections = 100

# Memory settings (adjust based on system)
shared_buffers = 256MB  # Increase from 128MB
work_mem = 8MB          # Increase from 4MB (for sorting)
maintenance_work_mem = 128MB  # Increase from 64MB (for VACUUM, indexes)

# Write Ahead Log (WAL) - important for reliability
wal_level = replica
max_wal_senders = 3
wal_keep_size = 1GB

# Query planner (for complex financial calculations)
random_page_cost = 1.1  # SSD-optimized
effective_cache_size = 1GB
effective_io_concurrency = 200  # For SSDs

# Logging (helpful for debugging)
log_min_duration_statement = 1000  # Log queries taking >1s
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# Autovacuum (important for CRUD operations)
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_threshold = 1000
autovacuum_analyze_threshold = 500

# Statistics (for better query planning)
default_statistics_target = 500
