name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

# FORCES NODE 24 RUNTIME TO SILENCE DEPRECATION WARNINGS
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  packages: write
  pull-requests: write # REQUIRED for peter-evans/create-pull-request

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv lock
        uv sync --all-groups

    - name: Run tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
      run: uv run pytest --cov --cov-branch --cov-report=xml --junitxml=pytest-results.xml | tee pytest-output.txt

    - name: Upload Test Results Artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ci-result-tests
        path: |
          coverage.xml
          pytest-results.xml
          pytest-output.txt

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        flags: unittests
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true

  create-release:
    needs: test
    runs-on: ubuntu-latest
    if: |
      needs.test.result == 'success' &&
      !startsWith(github.event.head_commit.message, 'docs:') &&
      !startsWith(github.event.head_commit.message, 'chore: release')

    outputs:
      new_version: ${{ steps.calculate-version.outputs.new_version }}
      should_release: ${{ steps.calculate-version.outputs.should_release }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Calculate next version
      id: calculate-version
      run: |
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        COMMITS_SINCE_TAG=$(git log --pretty=format:"%s" $LATEST_TAG..HEAD)
        VERSION_BUMP="patch"

        if echo "$COMMITS_SINCE_TAG" | grep -q "^feat!"; then
          VERSION_BUMP="major"
        elif echo "$COMMITS_SINCE_TAG" | grep -q "^feat"; then
          VERSION_BUMP="minor"
        elif echo "$COMMITS_SINCE_TAG" | grep -q "^fix\|^perf\|^refactor"; then
          VERSION_BUMP="patch"
        else
          echo "should_release=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        CURRENT_VERSION=${LATEST_TAG#v}
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

        case $VERSION_BUMP in
          "major") MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          "minor") MINOR=$((MINOR + 1)); PATCH=0 ;;
          "patch") PATCH=$((PATCH + 1)) ;;
        esac

        NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "should_release=true" >> $GITHUB_OUTPUT

    - name: Update version in pyproject.toml
      if: steps.calculate-version.outputs.should_release == 'true'
      run: |
        NEW_VERSION=${{ steps.calculate-version.outputs.new_version }}
        VERSION_NUMBER=${NEW_VERSION#v}
        sed -i "s/^version = .*/version = \"$VERSION_NUMBER\"/" pyproject.toml

    - name: Install uv
      if: steps.calculate-version.outputs.should_release == 'true'
      uses: astral-sh/setup-uv@v5

    - name: Sync uv.lock with new version
      if: steps.calculate-version.outputs.should_release == 'true'
      run: uv lock

    - name: Generate changelog
      if: steps.calculate-version.outputs.should_release == 'true'
      run: |
        NEW_VERSION=${{ steps.calculate-version.outputs.new_version }}
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

        {
          echo "## Release Notes"
          echo ""
          echo "---"
          echo "Released on $(date +%Y-%m-%d)."
          echo ""

          echo "### 🚀 Features"
          git log --pretty=format:"- %s" $LATEST_TAG..HEAD | grep "^\- feat" | sed 's/^\- feat:/-/' || echo "- No new features."
          echo ""

          echo "### 🐛 Bug Fixes"
          git log --pretty=format:"- %s" $LATEST_TAG..HEAD | grep "^\- fix" | sed 's/^\- fix:/-/' || echo "- No fixes."
          echo ""

          echo "### 🧹 Chores & Other Changes"
          git log --pretty=format:"- %s" $LATEST_TAG..HEAD | grep "^\- chore\|\- refactor\|\- docs" | sed 's/^\- [a-z]*:/-/' || echo "- No other changes."
          echo ""

          echo "### 👥 Contributors"
          echo "- @${{ github.actor }}"
          echo ""

          echo "### 🐳 Deploy Green FinTech BaaS $NEW_VERSION"
          echo ""
          echo "---"
          echo ""
          echo "#### Pull the prebuilt Docker Image"
          echo "The immutable container for this release is hosted on the GCHR (GitHub Container Registry)."
          echo '```bash'
          echo "docker pull ghcr.io/${{ github.repository }}:$NEW_VERSION"
          echo '```'
          echo "#### Verifying GitHub Artifact Attestations"
          echo "The Docker images in this release have provenance attestations generated with GitHub Actions. These can be verified by using the GitHub CLI:"
          echo '```bash'
          echo "gh attestation verify ghcr.io/${{ github.repository }}:$NEW_VERSION --repo ${{ github.repository }}"
          echo '```'

        } > NEW_RELEASE_NOTES.md

        if [ -f CHANGELOG.md ]; then
          cat NEW_RELEASE_NOTES.md CHANGELOG.md > TEMP_CHANGELOG.md
          mv TEMP_CHANGELOG.md CHANGELOG.md
        else
          mv NEW_RELEASE_NOTES.md CHANGELOG.md
        fi

    # THIS REPLACES THE MANUAL GIT PUSH LOGIC
    - name: Create Pull Request for Release
      if: steps.calculate-version.outputs.should_release == 'true'
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore: release ${{ steps.calculate-version.outputs.new_version }}"
        title: "chore: release ${{ steps.calculate-version.outputs.new_version }}"
        body: |
          Automated version bump to ${{ steps.calculate-version.outputs.new_version }}.
          Please review the CHANGELOG.md and merge.
        branch: "release/${{ steps.calculate-version.outputs.new_version }}"
        base: main

    - name: Create GitHub Release
      if: steps.calculate-version.outputs.should_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.calculate-version.outputs.new_version }}
        name: Release ${{ steps.calculate-version.outputs.new_version }}
        body_path: NEW_RELEASE_NOTES.md
        generate_release_notes: false

    - name: Log in to the Container registry
      if: steps.calculate-version.outputs.should_release == 'true'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Lowercase Repository Name
      if: steps.calculate-version.outputs.should_release == 'true'
      run: |
        echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

    - name: Build and push Docker image
      if: steps.calculate-version.outputs.should_release == 'true'
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ env.REPO_LC }}:latest
          ghcr.io/${{ env.REPO_LC }}:${{ steps.calculate-version.outputs.new_version }}
