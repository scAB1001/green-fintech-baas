name: Release

on:
  push:
    branches:
      - main
    # Only trigger on actual commits, not on tag pushes or other events
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.gitignore'
      - 'LICENSE'

jobs:
  # First, run tests to ensure main is stable
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
      with:
        # Fetch full history for version calculation
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Install dependencies
      run: |
        uv sync --frozen --no-dev

    - name: Run tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
      run: |
        uv run pytest -v

  # Create release only if tests pass
  create-release:
    needs: test
    runs-on: ubuntu-latest
    # Only create releases for meaningful commits (skip docs-only changes)
    if: |
      needs.test.result == 'success' &&
      github.event.head_commit.message != 'chore: update README' &&
      !startsWith(github.event.head_commit.message, 'docs:') &&
      !startsWith(github.event.head_commit.message, 'chore: update')

    outputs:
      new_version: ${{ steps.calculate-version.outputs.new_version }}
      should_release: ${{ steps.calculate-version.outputs.should_release }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Calculate next version
      id: calculate-version
      run: |
        # Determine if we should create a release
        # Based on conventional commit types in the last merge
        LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
        echo "Last commit: $LAST_COMMIT_MSG"

        # Check commit types since last tag
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Latest tag: $LATEST_TAG"

        # Get commits since last tag
        COMMITS_SINCE_TAG=$(git log --pretty=format:"%s" $LATEST_TAG..HEAD)

        # Determine version bump type
        VERSION_BUMP="patch"  # default

        if echo "$COMMITS_SINCE_TAG" | grep -q "^feat!"; then
          VERSION_BUMP="major"
        elif echo "$COMMITS_SINCE_TAG" | grep -q "^feat"; then
          VERSION_BUMP="minor"
        elif echo "$COMMITS_SINCE_TAG" | grep -q "^fix\|^perf\|^refactor"; then
          VERSION_BUMP="patch"
        else
          # No version-worthy changes
          echo "should_release=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Parse current version
        CURRENT_VERSION=${LATEST_TAG#v}
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

        # Bump version
        case $VERSION_BUMP in
          "major")
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          "minor")
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          "patch")
            PATCH=$((PATCH + 1))
            ;;
        esac

        NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
        echo "New version: $NEW_VERSION"
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "should_release=true" >> $GITHUB_OUTPUT

    - name: Update version in pyproject.toml
      if: steps.calculate-version.outputs.should_release == 'true'
      run: |
        NEW_VERSION=${{ steps.calculate-version.outputs.new_version }}
        VERSION_NUMBER=${NEW_VERSION#v}

        # Update pyproject.toml using Python for safety
        python3 -c "
        import toml
        with open('pyproject.toml', 'r') as f:
            data = toml.load(f)

        # Update version in [tool.poetry] or [project]
        if 'tool' in data and 'poetry' in data['tool']:
            data['tool']['poetry']['version'] = '$VERSION_NUMBER'
        elif 'project' in data:
            data['project']['version'] = '$VERSION_NUMBER'

        with open('pyproject.toml', 'w') as f:
            toml.dump(data, f)
        "

        # Verify the update
        echo "Updated pyproject.toml:"
        grep -i version pyproject.toml

    - name: Generate changelog
      if: steps.calculate-version.outputs.should_release == 'true'
      run: |
        NEW_VERSION=${{ steps.calculate-version.outputs.new_version }}
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

        # Create changelog from commits since last tag
        echo "# Changelog" > CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "## $NEW_VERSION ($(date +%Y-%m-%d))" >> CHANGELOG.md
        echo "" >> CHANGELOG.md

        # Group commits by type
        echo "### Features" >> CHANGELOG.md
        git log --pretty=format:"- %s" $LATEST_TAG..HEAD | grep "^\- feat" | sed 's/^\- feat:/-/' >> CHANGELOG.md
        echo "" >> CHANGELOG.md

        echo "### Fixes" >> CHANGELOG.md
        git log --pretty=format:"- %s" $LATEST_TAG..HEAD | grep "^\- fix" | sed 's/^\- fix:/-/' >> CHANGELOG.md
        echo "" >> CHANGELOG.md

        echo "### Chores" >> CHANGELOG.md
        git log --pretty=format:"- %s" $LATEST_TAG..HEAD | grep "^\- chore" | sed 's/^\- chore:/-/' >> CHANGELOG.md
        echo "" >> CHANGELOG.md

        # Append previous changelog if exists
        if [ -f CHANGELOG.old.md ]; then
          echo "" >> CHANGELOG.md
          cat CHANGELOG.old.md >> CHANGELOG.md
        fi

    - name: Commit version update
      if: steps.calculate-version.outputs.should_release == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        NEW_VERSION=${{ steps.calculate-version.outputs.new_version }}

        # Add and commit version files
        git add pyproject.toml CHANGELOG.md
        git commit -m "chore: release $NEW_VERSION"

        # Create and push tag
        git tag -a $NEW_VERSION -m "Release $NEW_VERSION"
        git push origin $NEW_VERSION

        # Push the version commit to main
        git push origin main

    - name: Create GitHub Release
      if: steps.calculate-version.outputs.should_release == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.calculate-version.outputs.new_version }}
        name: Release ${{ steps.calculate-version.outputs.new_version }}
        body_path: CHANGELOG.md
        draft: false
        prerelease: false
        generate_release_notes: true

    - name: Build and push Docker image
      if: steps.calculate-version.outputs.should_release == 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:${{ steps.calculate-version.outputs.new_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to Staging
      if: steps.calculate-version.outputs.should_release == 'true'
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        # Example: Deploy to Railway
        echo "Deploying ${{ steps.calculate-version.outputs.new_version }} to staging..."
        # railway up --service your-service-name