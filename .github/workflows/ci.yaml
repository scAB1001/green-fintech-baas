name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
      tags:
        description: 'Test scenario tags'
        required: false
        type: boolean
      environment:
        description: 'Environment to run tests against'
        type: environment
        required: true


jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv lock
          uv sync --all-groups

      - name: Run Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        run: uv run pytest --cov --cov-branch --cov-report=xml --junitxml=pytest-results.xml | tee pytest-output.txt

      - name: Upload Test Results Artifact
        if: always() # Ensures we get the logs even if a test fails!
        uses: actions/upload-artifact@v4
        with:
          name: ci-result-tests
          path: |
            coverage.xml
            pytest-results.xml
            pytest-output.txt

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')

    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Save Build Status
      run: echo "Docker image built and pushed to GHCR for SHA ${{ github.sha }}" > build-output.txt

    - name: Upload Build Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ci-result-build
        path: build-output.txt

  create-release:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: |
      needs.lint-and-test.result == 'success' &&
      !startsWith(github.event.head_commit.message, 'docs:') &&
      !startsWith(github.event.head_commit.message, 'chore: release')

    outputs:
      new_version: ${{ steps.calculate-version.outputs.new_version }}
      should_release: ${{ steps.calculate-version.outputs.should_release }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Calculate next version
      id: calculate-version
      run: |
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        COMMITS_SINCE_TAG=$(git log --pretty=format:"%s" $LATEST_TAG..HEAD)
        VERSION_BUMP="patch"

        if echo "$COMMITS_SINCE_TAG" | grep -q "^feat!"; then
          VERSION_BUMP="major"
        elif echo "$COMMITS_SINCE_TAG" | grep -q "^feat"; then
          VERSION_BUMP="minor"
        elif echo "$COMMITS_SINCE_TAG" | grep -q "^fix\|^perf\|^refactor"; then
          VERSION_BUMP="patch"
        else
          echo "should_release=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        CURRENT_VERSION=${LATEST_TAG#v}
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

        case $VERSION_BUMP in
          "major") MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          "minor") MINOR=$((MINOR + 1)); PATCH=0 ;;
          "patch") PATCH=$((PATCH + 1)) ;;
        esac

        NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "should_release=true" >> $GITHUB_OUTPUT

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Generate changelog
      if: steps.calculate-version.outputs.should_release == 'true'
      run: |
        NEW_VERSION=${{ steps.calculate-version.outputs.new_version }}
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

        {
          echo "## $NEW_VERSION ($(date +%Y-%m-%d))"
          echo "### Features"
          git log --pretty=format:"- %s" $LATEST_TAG..HEAD | grep "^\- feat" || echo "- No new features."
          echo "### Fixes"
          git log --pretty=format:"- %s" $LATEST_TAG..HEAD | grep "^\- fix" || echo "- No fixes."
        } > RELEASE_NOTES.md

  deploy-staging:
      needs: [lint-and-test, build-and-push]
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/main'

      steps:
        - uses: actions/checkout@v6

        - name: Install Railway CLI
          run: npm install -g @railway/cli

        - name: Deploy to Railway
          env:
            RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          run: |
            railway up --detach --service green-fintech-api
            echo "Successfully triggered Railway deployment for SHA ${{ github.sha }}" > deploy-output.txt

        - name: Upload Deploy Artifact
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: ci-result-deploy
            path: deploy-output.txt

  merge-results:
    if: always() # Run even if previous jobs skipped/failed so we always get a consolidated report
    needs: [lint-and-test, build-and-push, deploy-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Merge all CI artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: all-ci-results
          pattern: ci-result-*
