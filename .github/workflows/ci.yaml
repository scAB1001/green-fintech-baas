name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-test:
    name: Run Pytest & Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv lock
          uv sync --all-groups

      - name: Run Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        run: uv run pytest --cov --cov-branch --cov-report=xml --junitxml=pytest-results.xml | tee pytest-output.txt

      - name: Upload Test Results Artifact
        if: always() # Ensures we get the logs even if a test fails!
        uses: actions/upload-artifact@v7
        with:
          name: ci-result-tests
          path: |
            coverage.xml
            pytest-results.xml
            pytest-output.txt

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  docker-dry-run:
    name: Verify Docker Build
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image (No Push)
      uses: docker/build-push-action@v7
      with:
        context: .
        push: false # Strictly verifies it builds without publishing
        tags: green-fintech-baas:test-build
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Save Build Status
      run: echo "Docker image compiled successfully for SHA ${{ github.sha }}" > build-output.txt

    - name: Upload Build Artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ci-result-build
        path: build-output.txt

  merge-results:
    name: Consolidate CI Artifacts
    if: always() # Run even if previous jobs skipped/failed to get a consolidated report
    needs: [lint-and-test, docker-dry-run]
    runs-on: ubuntu-latest
    steps:
      - name: Merge all CI artifacts
        uses: actions/upload-artifact/merge@v7
        with:
          name: all-ci-results
          pattern: ci-result-*
