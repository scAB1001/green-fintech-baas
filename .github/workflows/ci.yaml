name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-test:
    if: github.actor != 'dependabot[bot]'
    name: Run Pytest & Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync --frozen --all-groups
          uv add pytest-cov --group dev

      - name: Run Tests
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
          POSTGRES_PORT: 5432
          POSTGRES_INITDB_ARGS: "--auth=scram-sha-256"
          API_KEY: sk_test_greenfintech_123456
          REDIS_PASSWORD: dev_password
          REDIS_PORT: 6379
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        run: |
          set -o pipefail
          uv run pytest --cov=src \
            --cov-r eport=xml:${{ github.workspace }}/coverage.xml \
            --junitxml=${{ github.workspace }}/pytest-results.xml \
            -o junit_family=legacy \
            | tee pytest-output.txt

      - name: Upload Test Results Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-result-tests
          path: |
            coverage.xml
            pytest-results.xml
            pytest-output.txt

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ${{ github.workspace }}/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  docker-dry-run:
    if: github.actor != 'dependabot[bot]'
    name: Verify Docker Build
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image (No Push)
      uses: docker/build-push-action@v7
      with:
        context: .
        push: false
        tags: green-fintech-baas:test-build
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Save Build Status
      run: echo "Docker image compiled successfully for SHA ${{ github.sha }}" > build-output.txt

    - name: Upload Build Artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ci-result-build
        path: build-output.txt

  merge-results:
    name: Consolidate CI Artifacts
    if: success()
    needs: [lint-and-test, docker-dry-run]
    runs-on: ubuntu-latest
    steps:
      - name: Merge all CI artifacts
        uses: actions/upload-artifact/merge@v7
        with:
          name: all-ci-results
          pattern: ci-result-*
